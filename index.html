<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漫画天地 - 亲子漫坊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        img {
            vertical-align: top;
        }
        
        :root {
            --primary-blue: #1a73e8;
            --secondary-blue: #4285f4;
            --light-blue: #e8f0fe;
            --dark-blue: #0d47a1;
            --accent-blue: #bbdefb;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --background: #f8f9fa;
            --card-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }
        
        body {
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        
        /* 头部样式 */
        header {
            background: linear-gradient(135deg, var(--dark-blue), var(--primary-blue));
            color: white;
            padding: 1rem 0;
            box-shadow: 0 4px 12px var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .logo i {
            font-size: 2.2rem;
        }
        
        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }
        
        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            padding: 8px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        
        nav a:hover, nav a.active {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        /* 主要内容区域 */
        main {
            min-height: calc(100vh - 180px);
            padding: 2rem 0;
        }
        
        /* 首页样式 */
        .page-title {
            text-align: center;
            color: var(--dark-blue);
            font-size: 2.2rem;
            position: relative;
            padding: 15px 0;
        }
        
        .page-title:after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: var(--primary-blue);
            border-radius: 2px;
        }

        .page-description {
            text-align: center;
            color: var(--text-secondary);
            margin: 2rem 0;
        }
        
        /* 漫画网格 */
        .comics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 1.5rem;
        }
        
        .comic-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 15px var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }
        
        .comic-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.15);
        }
        
        .comic-cover {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        
        .comic-info {
            padding: 1.5rem;
        }
        
        .comic-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-blue);
        }
        
        .comic-author {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
        }
        
        .comic-stats {
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
        }
        
        .comic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.8rem;
        }
        
        .tag {
            background-color: var(--light-blue);
            color: var(--primary-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        /* 详情页样式 */
        .comic-detail-container {
            display: none;
        }
        
        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background-color 0.3s;
        }
        
        .back-btn:hover {
            background-color: var(--dark-blue);
        }
        
        .comic-detail {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 8px 20px var(--shadow);
        }
        
        .comic-meta {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .detail-cover {
            width: 190px;
            height: 340px;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
        }
        
        .detail-info {
            flex: 1;
            min-width: 300px;
        }
        
        .detail-title {
            font-size: 2rem;
            color: var(--dark-blue);
            margin-bottom: 0.8rem;
        }
        
        .detail-author {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1.2rem;
        }
        
        .detail-description {
            line-height: 1.8;
            color: var(--text-primary);
            margin-bottom: 1.5rem;
        }
        
        /* 漫画查看器 */
        .comic-viewer {
            margin-top: 2rem;
        }
        
        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #eee;
        }
        
        .viewer-title {
            font-size: 1.5rem;
            color: var(--dark-blue);
        }
        
        .view-mode-selector {
            display: flex;
            gap: 0.5rem;
            background-color: var(--light-blue);
            padding: 6px;
            border-radius: 8px;
        }
        
        .mode-btn {
            padding: 8px 16px;
            background: none;
            border: none;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .mode-btn.active {
            background-color: var(--primary-blue);
            color: white;
        }
        
        .mode-btn:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.8);
        }
        
        /* 切换模式 */
        .carousel-container {
            position: relative;
            min-height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa;
            border-radius: 10px;
            padding: 20px;
        }
        
        .carousel-slide {
            display: none;
            width: 100%;
            text-align: center;
        }
        
        .carousel-slide.active {
            display: block;
        }
        
        .carousel-image {
            max-width: 100%;
            max-height: 550px;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }
        
        .carousel-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        
        .carousel-btn {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s;
        }
        
        .carousel-btn:hover {
            background-color: var(--dark-blue);
        }
        
        .carousel-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .carousel-pagination {
            display: flex;
            align-items: center;
        }
        
        .carousel-indicators {
            display: flex;
            gap: 0.8rem;
        }
        
        .indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #ccc;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .indicator.active {
            background-color: var(--primary-blue);
        }
        
        .page-info {
            font-weight: 500;
            color: var(--text-secondary);
            margin-left: 20px;
        }
        
        /* 全部展示模式 */
        .full-display-container {
            display: none;
        }
        
        .comic-pages {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        
        .comic-page {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }
        
        /* 页脚 */
        footer {
            background-color: var(--dark-blue);
            color: white;
            padding: 1rem 0;
            margin-top: 3rem;
        }
        
        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        
        .footer-logo {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .copyright {
            color: #bbdefb;
        }
        
        .social-links {
            display: flex;
            gap: 1.2rem;
        }
        
        .social-links a {
            color: white;
            font-size: 1.3rem;
            transition: color 0.3s;
        }
        
        .social-links a:hover {
            color: var(--accent-blue);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            
            nav ul {
                gap: 1rem;
            }
            
            .comics-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .comic-meta {
                flex-direction: column;
            }
            
            .detail-cover {
                width: 100%;
                max-width: 300px;
                height: auto;
                aspect-ratio: 3/4;
            }
            
            .carousel-controls {
                flex-direction: column;
                gap: 1rem;
            }
            
            .footer-content {
                flex-direction: column;
                text-align: center;
            }
        }
        
        /* 工具类 */
        .hidden {
            display: none;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--accent-blue);
        }
        
        /* 大图预览模态框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            overflow: auto;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .modal.show {
            display: block;
            opacity: 1;
        }
        
        .modal-content {
            display: block;
            margin: 60px auto;
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            animation: zoomIn 0.3s ease;
        }
        
        @keyframes zoomIn {
            from {transform: scale(0.9); opacity: 0;}
            to {transform: scale(1); opacity: 1;}
        }
        
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .close-modal:hover {
            color: #bbdefb;
        }
        
        .modal-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 50px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
            background-color: rgba(0, 0, 0, 0.5);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .modal-nav:hover {
            opacity: 1;
            background-color: rgba(0, 0, 0, 0.7);
        }
        
        .modal-prev {
            left: 30px;
        }
        
        .modal-next {
            right: 30px;
        }
        
        .modal-info {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 18px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.5);
        }
    </style>
</head>

                            </div>

                    </div>
                    
                    <!-- 全部展示模式 -->
                    <div class="full-display-container" id="full-viewer">
                        <div class="comic-pages" id="comic-pages">
                            <!-- 全部页面将通过JavaScript动态生成 -->
                            <div class="empty-state">
                                <i class="fas fa-book-open"></i>
                                <p>暂无漫画内容</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-logo">

            <div class="copyright">

    <!-- 大图预览模态框 -->
    <div id="image-modal" class="modal">
        <span class="close-modal">&times;</span>
        <div class="modal-nav modal-prev">

        // 当前查看的漫画和页面索引
        let currentComic = null;
        let currentPageIndex = 0;
        let currentImageSet = []; // 存储当前显示的图片集合
        let currentImageIndex = 0; // 当前预览的图片索引
        
        // DOM元素
        const homePage = document.getElementById('home-page');
        const detailPage = document.getElementById('detail-page');
        const comicsGrid = document.getElementById('comics-grid');
        const backToHomeBtn = document.getElementById('back-to-home');
        const carouselModeBtn = document.getElementById('carousel-mode');
        const fullModeBtn = document.getElementById('full-mode');
        const carouselViewer = document.getElementById('carousel-viewer');
        const fullViewer = document.getElementById('full-viewer');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currentPageElement = document.getElementById('current-page');
        const totalPagesElement = document.getElementById('total-pages');
        const indicatorsContainer = document.getElementById('indicators');
        const comicPagesContainer = document.getElementById('comic-pages');
        const carouselContainer = document.getElementById('carousel-container');
        const carouselEmpty = document.getElementById('carousel-empty');
        const updateDateElement = document.getElementById('update-date');
        const imageModal = document.getElementById('image-modal');
        const modalImage = document.getElementById('modal-image');
        const closeModal = document.querySelector('.close-modal');
        const modalPrev = document.querySelector('.modal-prev');
        const modalNext = document.querySelector('.modal-next');
        const modalPageInfo = document.getElementById('modal-page-info');
        
        // 初始化首页漫画列表
        function renderComicsList() {
            comicsGrid.innerHTML = '';
            
            comicsData.forEach(comic => {
                const comicCard = document.createElement('div');
                comicCard.className = 'comic-card';
                comicCard.dataset.id = comic.id;
                
                comicCard.innerHTML = `
                    <div class="image-wrapper">
                        <img src="${comic.pages[0]}" alt="${comic.title}" class="comic-cover">
                    </div>
                    <div class="comic-info">
                        <h3 class="comic-title">${comic.title}</h3>
                        <p class="comic-author">作者：${comic.author}</p>
                        <div class="comic-stats">
                            <span>${comic.pages.length}页</span>
                            <span>${comic.updateDate}</span>
                        </div>
                        <div class="comic-tags">
                            ${comic.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    </div>
                `;
                
                // 添加封面点击事件
                const coverImg = comicCard.querySelector('.comic-cover');
                coverImg.addEventListener('click', (e) => {
                    // e.stopPropagation();
                    // openModal([comic.pages[0]], 0, comic.title);
                });
                
                comicCard.addEventListener('click', () => showComicDetail(comic.id));
                comicsGrid.appendChild(comicCard);
            });
        }
        
        // 显示漫画详情
        function showComicDetail(comicId) {
            const comic = comicsData.find(c => c.id === comicId);
            if (!comic) return;
            
            currentComic = comic;
            currentPageIndex = 0;
            
            // 更新详情页信息
            document.getElementById('detail-cover').src = comic.pages[0];
            document.getElementById('detail-cover').alt = comic.title;
            document.getElementById('detail-title').textContent = comic.title;
            document.getElementById('detail-author').textContent = `作者：${comic.author}`;
            document.getElementById('detail-description').textContent = comic.description;
            document.getElementById('detail-page-title').textContent = comic.title;
            
            // 更新统计信息
            updateDateElement.textContent = `更新：${comic.updateDate}`;
            
            // 更新标签
            const tagsContainer = document.getElementById('detail-tags');
            tagsContainer.innerHTML = comic.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
            
            // 添加封面点击事件
            const detailCover = document.getElementById('detail-cover');
            detailCover.onclick = (e) => {
                // e.stopPropagation();
                // openModal([comic.pages[0]], 0, comic.title);
            };
            
            // 动态生成轮播图
            generateCarouselSlides();
            
            // 更新指示器
            updateIndicators();
            
            // 更新全部展示模式
            updateFullViewer();
            
            // 更新页码信息
            updatePageInfo();
            
            // 更新按钮状态
            updateButtonStates();
            
            // 切换到详情页
            homePage.style.display = 'none';
            detailPage.style.display = 'block';
        }
        
        // 动态生成轮播图幻灯片
        function generateCarouselSlides() {
            // 清空轮播容器
            carouselContainer.innerHTML = '';
            
            if (currentComic.pages.length === 0) {
                carouselContainer.appendChild(carouselEmpty.cloneNode(true));
                return;
            }
            
            // 创建幻灯片
            currentComic.pages.forEach((page, index) => {
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                if (index === 0) slide.classList.add('active');
                
                const img = document.createElement('img');
                img.src = page;
                img.alt = `${currentComic.title} - 第${index+1}页`;
                img.className = 'carousel-image';
                
                // 添加点击事件
                img.addEventListener('click', () => {
                    openModal(currentComic.pages, index, currentComic.title);
                });
                
                slide.appendChild(img);
                carouselContainer.appendChild(slide);
            });
        }
        
        // 更新指示器
        function updateIndicators() {
            indicatorsContainer.innerHTML = '';
            
            if (!currentComic || currentComic.pages.length === 0) return;
            
            for (let i = 0; i < currentComic.pages.length; i++) {
                const indicator = document.createElement('div');
                indicator.className = `indicator ${i === currentPageIndex ? 'active' : ''}`;
                indicator.dataset.index = i;
                
                indicator.addEventListener('click', () => {
                    goToPage(i);
                });
                
                indicatorsContainer.appendChild(indicator);
            }
        }
        
        // 更新全部展示模式
        function updateFullViewer() {
            comicPagesContainer.innerHTML = '';
            
            if (!currentComic || currentComic.pages.length === 0) {
                const emptyState = document.createElement('div');
                emptyState.className = 'empty-state';
                emptyState.innerHTML = `
                    <i class="fas fa-book-open"></i>
                    <p>暂无漫画内容</p>
                `;
                comicPagesContainer.appendChild(emptyState);
                return;
            }
            
            currentComic.pages.forEach((page, index) => {
                const pageImg = document.createElement('img');
                pageImg.src = page;
                pageImg.alt = `${currentComic.title} - 第${index+1}页`;
                pageImg.className = 'comic-page';
                
                // 添加点击事件
                pageImg.addEventListener('click', () => {
                    openModal(currentComic.pages, index, currentComic.title);
                });
                
                comicPagesContainer.appendChild(pageImg);
            });
        }
        
        // 打开大图预览模态框
        function openModal(imageSet, index, title) {
            currentImageSet = imageSet;
            currentImageIndex = index;
            
            modalImage.src = imageSet[index];
            modalImage.alt = `${title} - 第${index+1}页`;
            modalPageInfo.textContent = `${index+1} / ${imageSet.length}`;
            
            imageModal.classList.add('show');
            document.body.style.overflow = 'hidden'; // 防止背景滚动
        }
        
        // 关闭大图预览模态框
        function closeImageModal() {
            imageModal.classList.remove('show');
            document.body.style.overflow = ''; // 恢复背景滚动
        }
        
        // 导航到上一张图片
        function prevImage() {
            if (currentImageIndex > 0) {
                currentImageIndex--;
                modalImage.src = currentImageSet[currentImageIndex];
                modalPageInfo.textContent = `${currentImageIndex+1} / ${currentImageSet.length}`;
            }
        }
        
        // 导航到下一张图片
        function nextImage() {
            if (currentImageIndex < currentImageSet.length - 1) {
                currentImageIndex++;
                modalImage.src = currentImageSet[currentImageIndex];
                modalPageInfo.textContent = `${currentImageIndex+1} / ${currentImageSet.length}`;
            }
        }
        
        // 更新页码信息
        function updatePageInfo() {
            if (!currentComic) return;
            
            currentPageElement.textContent = currentPageIndex + 1;
            totalPagesElement.textContent = currentComic.pages.length;
        }
        
        // 更新按钮状态
        function updateButtonStates() {
            if (!currentComic || currentComic.pages.length === 0) {
                prevBtn.disabled = true;
                nextBtn.disabled = true;
                return;
            }
            
            prevBtn.disabled = currentPageIndex === 0;
            nextBtn.disabled = currentPageIndex === currentComic.pages.length - 1;
        }
        
        // 跳转到指定页面
        function goToPage(pageIndex) {
            if (!currentComic || pageIndex < 0 || pageIndex >= currentComic.pages.length) return;
            
            // 更新当前页面索引
            currentPageIndex = pageIndex;
            
            // 更新轮播图显示
            const slides = document.querySelectorAll('.carousel-slide');
            slides.forEach((slide, index) => {
                if (index === pageIndex) {
                    slide.classList.add('active');
                } else {
                    slide.classList.remove('active');
                }
            });
            
            // 更新指示器
            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((indicator, index) => {
                if (index === pageIndex) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
            
            // 更新页码信息
            updatePageInfo();
            
            // 更新按钮状态
            updateButtonStates();
        }
        
        // 切换到上一页
        function prevPage() {
            if (currentPageIndex > 0) {
                goToPage(currentPageIndex - 1);
            }
        }
        
        // 切换到下一页
        function nextPage() {
            if (currentPageIndex < currentComic.pages.length - 1) {
                goToPage(currentPageIndex + 1);
            }
        }
        
        // 切换查看模式
        function switchViewMode(mode) {
            if (mode === 'carousel') {
                carouselModeBtn.classList.add('active');
                fullModeBtn.classList.remove('active');
                carouselViewer.style.display = 'block';
                fullViewer.style.display = 'none';
            } else {
                carouselModeBtn.classList.remove('active');
                fullModeBtn.classList.add('active');
                carouselViewer.style.display = 'none';
                fullViewer.style.display = 'block';
            }
        }
        
        // 返回首页
        function goToHome() {
            homePage.style.display = 'block';
            detailPage.style.display = 'none';
            closeImageModal(); // 关闭可能存在的模态框
        }
        
        // 初始化事件监听
        function initEventListeners() {
            // 返回首页按钮
            backToHomeBtn.addEventListener('click', (e) => {
                e.preventDefault();
                goToHome();
            });
            
            // 切换模式按钮
            carouselModeBtn.addEventListener('click', () => {
                switchViewMode('carousel');
            });
            
            fullModeBtn.addEventListener('click', () => {
                switchViewMode('full');
            });
            
            // 轮播控制按钮
            prevBtn.addEventListener('click', prevPage);
            nextBtn.addEventListener('click', nextPage);
            
            // 键盘控制
            document.addEventListener('keydown', (e) => {
                if (detailPage.style.display !== 'block') return;
                
                if (e.key === 'ArrowLeft') {
                    prevPage();
                } else if (e.key === 'ArrowRight') {
                    nextPage();
                }
            });
            
            // 模态框事件
            closeModal.addEventListener('click', closeImageModal);
            modalPrev.addEventListener('click', prevImage);
            modalNext.addEventListener('click', nextImage);
            
            // 点击模态框背景关闭
            imageModal.addEventListener('click', (e) => {
                if (e.target === imageModal) {
                    closeImageModal();
                }
            });
            
            // ESC键关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && imageModal.classList.contains('show')) {
                    closeImageModal();
                }
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            renderComicsList();
            initEventListeners();
        });
    </script>
